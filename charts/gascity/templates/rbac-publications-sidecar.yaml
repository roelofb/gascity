apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ printf "%s-publications-sidecar" (include "gascity.controllerName" .) }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gascity.labels" . | nindent 4 }}
rules:
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ printf "%s-publications-sidecar" (include "gascity.controllerName" .) }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gascity.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ printf "%s-publications-sidecar" (include "gascity.controllerName" .) }}
subjects:
  - kind: ServiceAccount
    name: {{ printf "%s-publications-sidecar" (include "gascity.controllerName" .) }}
    namespace: {{ .Release.Namespace }}
