{{- if and .Values.ingress.enabled .Values.ingress.discordInteractions.enabled -}}
{{- $host := include "gascity.host" (dict "root" . "svc" .Values.ingress.discordInteractions.host) -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ printf "%s-discord-interactions" (include "gascity.controllerName" .) }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gascity.labels" . | nindent 4 }}
    app.kubernetes.io/component: discord-interactions
  annotations:
    cert-manager.io/cluster-issuer: {{ .Values.ingress.clusterIssuer }}
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  tls:
    - hosts:
        - {{ $host }}
      secretName: {{ printf "%s-tls" (include "gascity.controllerName" .) }}-discord-interactions
  rules:
    - host: {{ $host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.ingress.discordInteractions.service }}
                port:
                  number: {{ .Values.ingress.discordInteractions.port }}
{{- end -}}
