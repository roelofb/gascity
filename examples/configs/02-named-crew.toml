#:schema ../../docs/schema/city-schema.json
# Tutorial 02 — Named Crew
#
# Mayor plans, worker codes. Beads are hooked to specific agents
# via `gc agent claim <name> <bead-id>`.

[workspace]
name = "my-city"

[[agents]]
name = "mayor"
prompt_template = ".gc/prompts/mayor.md"

[[agents]]
name = "worker"
prompt_template = ".gc/prompts/worker.md"

[beads]
provider = "bd"
