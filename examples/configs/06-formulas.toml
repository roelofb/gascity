#:schema ../../docs/schema/city-schema.json
# Tutorial 06 — Formulas & Molecules
#
# Adds structured multi-step workflows. Formulas live in .gc/formulas/
# as TOML files. `gc mol create <formula>` instantiates a molecule
# (bead DAG) that agents walk step by step.

[workspace]
name = "my-city"
provider = "claude"

[formulas]
dir = ".gc/formulas"

[[agents]]
name = "mayor"
prompt_template = ".gc/prompts/mayor.md"

[[agents]]
name = "worker"
prompt_template = ".gc/prompts/worker.md"

[beads]
provider = "bd"
